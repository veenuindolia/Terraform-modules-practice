name: Create New RG

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest


    steps:
    
      - name: azure login  
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

     
      - name: Checkout Code
        uses: actions/checkout@v4

      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      
      - name: Terraform Init
        working-directory: "Environment/Dev/Parent module"
        run: terraform init

    
      - name: Terraform Plan
        working-directory: "Environment/Dev/Parent module"
        run: terraform plan

      
      - name: Terraform Apply
        working-directory: "Environment/Dev/Parent module"
        run: terraform apply -auto-approve
        
